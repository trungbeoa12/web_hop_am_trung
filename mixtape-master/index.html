<!DOCTYPE html>
<html lang="vi">
<head>
	<title>Trung Béo Chords</title>
	<meta charset="utf-8">
	<meta http-equiv="X-UA-Compatible" content="IE=edge">
	<meta name="description" content="Thư viện hợp âm cá nhân">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<link rel="stylesheet" href="plugins/font-awesome-4.7.0/css/font-awesome.min.css">
	<link rel="stylesheet" href="styles/chord-app.css">
</head>
<body>
	<div class="app-shell">
		<header class="app-header">
			<a class="brand" href="#" aria-label="Trang chủ">
				<span class="brand-mark">TB</span>
				<span>Trung Béo <strong>Chords</strong></span>
			</a>
			<div class="header-actions">
				<button class="icon-button mobile-only" id="sidebarToggle" type="button" aria-label="Mở thư viện">
					<i class="fa fa-bars"></i>
				</button>
				<button class="primary-button" id="openSongForm" type="button">
					<i class="fa fa-plus"></i> Thêm bài hát
				</button>
			</div>
		</header>

		<aside class="sidebar" id="sidebar">
			<div class="sidebar-heading">
				<div>
					<span class="eyebrow">Bộ sưu tập</span>
					<h2>Thư viện bài hát</h2>
				</div>
				<button class="icon-button mobile-only" id="closeSidebar" type="button" aria-label="Đóng thư viện">
					<i class="fa fa-times"></i>
				</button>
			</div>
			<label class="search-box">
				<i class="fa fa-search"></i>
				<input id="songSearch" type="search" placeholder="Tìm bài hát, ca sĩ..." autocomplete="off">
			</label>
			<div class="library-meta">
				<span id="songCount">0 bài hát</span>
				<span class="status-dot" id="apiStatus">Đang kết nối</span>
			</div>
			<nav class="song-list" id="songList" aria-label="Danh sách bài hát"></nav>
			<div class="sidebar-footer">
				<span>ChordPro · Vanilla JS</span>
				<span>Dark stage mode</span>
			</div>
		</aside>

		<main class="main-content">
			<section class="song-hero">
				<div class="hero-art" aria-hidden="true"></div>
				<div class="hero-copy">
					<span class="eyebrow">Đang mở</span>
					<h1 id="songTitle">Chọn một bài hát</h1>
					<p id="songArtist">Hợp âm và lời nhạc sẽ xuất hiện tại đây.</p>
					<div class="song-tags" id="songTags"></div>
				</div>
			</section>

			<section class="viewer-card">
				<div class="viewer-toolbar">
					<div class="key-display">
						<span>Tông</span>
						<strong id="currentKey">--</strong>
					</div>
					<div class="transpose-controls" aria-label="Chuyển tông">
						<button class="tool-button" id="transposeDown" type="button" title="Hạ nửa cung">
							<i class="fa fa-minus"></i> 1
						</button>
						<span id="transposeValue">Nguyên bản</span>
						<button class="tool-button" id="transposeUp" type="button" title="Tăng nửa cung">
							<i class="fa fa-plus"></i> 1
						</button>
						<button class="icon-button" id="resetTranspose" type="button" title="Về tông gốc">
							<i class="fa fa-undo"></i>
						</button>
					</div>
				</div>
				<div class="chord-sheet" id="chordSheet" aria-live="polite">
					<div class="empty-state">
						<i class="fa fa-music"></i>
						<p>Chọn bài hát trong thư viện để bắt đầu chơi.</p>
					</div>
				</div>
			</section>
		</main>
	</div>

	<div class="sidebar-backdrop" id="sidebarBackdrop"></div>

	<div class="modal" id="songModal" aria-hidden="true">
		<div class="modal-backdrop" data-close-modal></div>
		<div class="modal-dialog" role="dialog" aria-modal="true" aria-labelledby="formTitle">
			<div class="modal-header">
				<div>
					<span class="eyebrow">Bài hát mới</span>
					<h2 id="formTitle">Dán nội dung ChordPro</h2>
				</div>
				<button class="icon-button" type="button" data-close-modal aria-label="Đóng">
					<i class="fa fa-times"></i>
				</button>
			</div>
			<form id="songForm">
				<div class="form-grid">
					<label>
						<span>Tên bài hát</span>
						<input name="title" required placeholder="Ví dụ: Cơn mưa ngang qua">
					</label>
					<label>
						<span>Ca sĩ / tác giả</span>
						<input name="artist" placeholder="Ví dụ: Sơn Tùng M-TP">
					</label>
					<label>
						<span>Tông gốc</span>
						<input name="key" placeholder="Ví dụ: C, Am, F#">
					</label>
					<label>
						<span>Thể loại</span>
						<input name="genre" placeholder="Ví dụ: Ballad">
					</label>
				</div>
				<label>
					<span>Nội dung ChordPro</span>
					<textarea name="content" required rows="13" placeholder="{title: Tên bài hát}&#10;{artist: Ca sĩ}&#10;{key: C}&#10;&#10;[C]Ngày em [G]đến, trời bỗng [Am]xanh hơn..."></textarea>
				</label>
				<div class="form-message" id="formMessage"></div>
				<div class="modal-actions">
					<button class="secondary-button" type="button" data-close-modal>Hủy</button>
					<button class="primary-button" type="submit">
						<i class="fa fa-save"></i> Lưu bài hát
					</button>
				</div>
			</form>
		</div>
	</div>

	<script src="https://cdn.jsdelivr.net/npm/chordsheetjs@15.4.0/lib/bundle.min.js"></script>
	<script src="js/config.js"></script>
	<script src="js/chord-app.js"></script>
</body>
</html>
